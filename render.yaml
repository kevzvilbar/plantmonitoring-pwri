services:
  # ─── Backend: FastAPI web service ─────────────────────────────────────────
  - type: web
    name: pwri-backend
    runtime: docker
    rootDir: .
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: pwri
      - key: DATABASE_URL
        fromDatabase:
          name: pwri-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false   # set to your frontend Render URL once deployed

  # ─── Frontend: Vite/React static site ─────────────────────────────────────
  - type: web
    name: pwri-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Point to your backend Render URL, e.g. https://pwri-backend.onrender.com
      - key: VITE_BACKEND_URL
        sync: false

databases:
  - name: pwri-db
    databaseName: pwri
    plan: free
