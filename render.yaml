services:
  # ─── Backend: FastAPI web service ─────────────────────────────────────────
  - type: web
    name: pwri-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: MONGO_URL
        sync: false          # set manually in Render dashboard
      - key: DB_NAME
        value: pwri
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      # Set this to your Render static site URL once it is deployed,
      # e.g. https://pwri-frontend.onrender.com
      - key: CORS_ORIGINS
        sync: false

  # ─── Frontend: Vite/React static site ─────────────────────────────────────
  - type: web
    name: pwri-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      # Point to your Render backend URL, e.g. https://pwri-backend.onrender.com
      - key: VITE_BACKEND_URL
        sync: false
